<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Completo IFA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== Header / Menu Hamburger ===================== -->
<header>
    <div class="logo">Meu Site</div>
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <nav id="nav-menu">
        <a href="#home">Home</a>
        <a href="#slides">Slides</a>
        <a href="#about">Sobre</a>
        <a href="#contact">Contato</a>
    </nav>
</header>

<!-- ===================== Título Animado ===================== -->
<div class="title-container">
    <h1 id="animated-title"></h1>
</div>

<!-- ===================== Slides de Imagens ===================== -->
<div class="slider" id="slides">
    <div class="slides">
        <img src="https://picsum.photos/id/1015/800/400" alt="Imagem 1">
        <img src="https://picsum.photos/id/1016/800/400" alt="Imagem 2">
        <img src="https://picsum.photos/id/1018/800/400" alt="Imagem 3">
    </div>
    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>
    <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</div>

<!-- ===================== Rodapé ===================== -->
<footer>
    José Matheus Borges dos Santos, I.I
</footer>

<script src="script.js"></script>
</body>
</html>
