<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Completo IFA</title>
    <style>
        /* ===================== Introdução (IFA) ===================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            overflow-x: hidden;
        }

        /* ===================== Menu Hamburger ===================== */
        header {
            position: fixed;
            width: 100%;
            background-color: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: white;
        }

        nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 200px;
            height: 100%;
            background-color: #444;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            transition: 0.3s;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            transition: 0.2s;
        }

        nav a:hover {
            background-color: #555;
        }

        nav.active {
            right: 0;
        }

        /* ===================== Slides de imagens ===================== */
        .slider {
            margin-top: 80px;
            position: relative;
            width: 90%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #fff;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slides img {
            width: 100%;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            font-size: 18px;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .dots {
            text-align: center;
            position: absolute;
            bottom: 10px;
            width: 100%;
        }

        .dot {
            height: 12px;
            width: 12px;
            margin: 0 5px;
            background-color: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }

        .active {
            background-color: white;
        }

        /* ===================== Título animado ===================== */
        .title-container {
            text-align: center;
            margin: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            border-right: 3px solid #333;
            white-space: nowrap;
            overflow: hidden;
        }

        /* ===================== Rodapé ===================== */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 10px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .slider { width: 95%; }
        }
    </style>
</head>
<body>

<!-- ===================== Introdução ===================== -->
<header>
    <div class="logo">Meu Site</div>
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <nav id="nav-menu">
        <a href="#home">Home</a>
        <a href="#slides">Slides</a>
        <a href="#about">Sobre</a>
        <a href="#contact">Contato</a>
    </nav>
</header>

<div class="title-container">
    <h1 id="animated-title"></h1>
</div>

<!-- ===================== Funcionalidade: Slides ===================== -->
<div class="slider" id="slides">
    <div class="slides">
        <img src="https://picsum.photos/id/1015/800/400" alt="Imagem 1">
        <img src="https://picsum.photos/id/1016/800/400" alt="Imagem 2">
        <img src="https://picsum.photos/id/1018/800/400" alt="Imagem 3">
    </div>
    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>
    <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</div>

<!-- ===================== Rodapé ===================== -->
<footer>
    José Matheus Borges dos Santos, I.I
</footer>

<!-- ===================== Ação: Scripts ===================== -->
<script>
    // ===== Menu Hamburger =====
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
    });

    // ===== Título animado (efeito digitação) =====
    const title = document.getElementById('animated-title');
    const text = "Bem-vindo ao Meu Site!";
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            title.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 100);
        } else {
            title.style.borderRight = "none"; // Remove o cursor após digitar
        }
    }
    typeWriter();

    // ===== Slides de imagens =====
    const slides = document.querySelector('.slides');
    const images = document.querySelectorAll('.slides img');
    const prev = document.querySelector('.prev');
    const next = document.querySelector('.next');
    const dots = document.querySelectorAll('.dot');

    let index = 0;

    function showSlide(i) {
        if (i < 0) index = images.length - 1;
        else if (i >= images.length) index = 0;
        else index = i;

        slides.style.transform = `translateX(${-index * 100}%)`;

        dots.forEach(dot => dot.classList.remove('active'));
        dots[index].classList.add('active');
    }

    prev.addEventListener('click', () => showSlide(index - 1));
    next.addEventListener('click', () => showSlide(index + 1));
    dots.forEach((dot, i) => {
        dot.addEventListener('click', () => showSlide(i));
    });

    setInterval(() => {
        showSlide(index + 1);
    }, 5000);

    showSlide(index);
</script>

</body>
</html>
